<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 540" font-family="Geist, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif">
  <defs>
    <filter id="card" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="7" flood-color="#3A2E26" flood-opacity="0.10"/>
    </filter>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#B07A4E"/>
    </marker>
  </defs>

  <rect x="2" y="2" width="1036" height="536" rx="22" fill="#FBF8F3" stroke="#EFE6D8"/>
  <text x="46" y="58" font-size="30" font-weight="700" fill="#3A2E26">How Chorus works</text>
  <text x="46" y="86" font-size="15" fill="#8A7866">One app. Your keys. Your data stays on your iPhone.</text>

  <!-- You -->
  <g filter="url(#card)"><rect x="46" y="190" width="172" height="118" rx="16" fill="#ffffff" stroke="#E7D9C8"/></g>
  <text x="132" y="242" text-anchor="middle" font-size="19" font-weight="700" fill="#3A2E26">You</text>
  <text x="132" y="268" text-anchor="middle" font-size="13.5" fill="#8A7866">type or speak</text>

  <!-- Chorus app -->
  <g filter="url(#card)"><rect x="322" y="140" width="334" height="218" rx="18" fill="#FFFDFB" stroke="#E2C9AE"/></g>
  <text x="489" y="178" text-anchor="middle" font-size="19" font-weight="700" fill="#5B4636">Chorus for iPhone</text>
  <text x="489" y="200" text-anchor="middle" font-size="12.5" fill="#A8927C">native app · on device</text>
  <g font-size="14.5" font-weight="600" fill="#4A3B2E" text-anchor="middle">
    <rect x="340" y="214" width="142" height="56" rx="12" fill="#F4ECE1" stroke="#E5D8C7"/><text x="411" y="248">Chat</text>
    <rect x="496" y="214" width="142" height="56" rx="12" fill="#F4ECE1" stroke="#E5D8C7"/><text x="567" y="248">Voice</text>
    <rect x="340" y="282" width="142" height="56" rx="12" fill="#F4ECE1" stroke="#E5D8C7"/><text x="411" y="316">Memory</text>
    <rect x="496" y="282" width="142" height="56" rx="12" fill="#F4ECE1" stroke="#E5D8C7"/><text x="567" y="316">Settings</text>
  </g>

  <!-- OpenRouter -->
  <g filter="url(#card)"><rect x="822" y="158" width="174" height="116" rx="16" fill="#ffffff" stroke="#E7D9C8"/></g>
  <text x="909" y="200" text-anchor="middle" font-size="18" font-weight="700" fill="#3A2E26">OpenRouter</text>
  <text x="909" y="223" text-anchor="middle" font-size="13" fill="#8A7866">AI models</text>
  <text x="909" y="244" text-anchor="middle" font-size="13" fill="#8A7866">Base / Strong</text>

  <!-- OpenAI -->
  <g filter="url(#card)"><rect x="346" y="402" width="158" height="110" rx="15" fill="#ffffff" stroke="#E7D9C8"/></g>
  <text x="425" y="438" text-anchor="middle" font-size="17" font-weight="700" fill="#3A2E26">OpenAI</text>
  <text x="425" y="461" text-anchor="middle" font-size="12.5" fill="#8A7866">speech to text</text>
  <text x="425" y="480" text-anchor="middle" font-size="12.5" fill="#8A7866">memory: learn + recall</text>

  <!-- On-device database -->
  <g filter="url(#card)"><rect x="528" y="402" width="170" height="110" rx="15" fill="#F6EEE2" stroke="#E5D8C7"/></g>
  <text x="613" y="438" text-anchor="middle" font-size="17" font-weight="700" fill="#5B4636">On-device database</text>
  <text x="613" y="461" text-anchor="middle" font-size="12.5" fill="#8A7866">your chats</text>
  <text x="613" y="480" text-anchor="middle" font-size="12.5" fill="#8A7866">your memories</text>

  <!-- arrows -->
  <line x1="222" y1="249" x2="318" y2="249" stroke="#B07A4E" stroke-width="2.2" marker-end="url(#ah)"/>

  <line x1="660" y1="200" x2="818" y2="200" stroke="#B07A4E" stroke-width="2.2" marker-end="url(#ah)"/>
  <text x="739" y="190" text-anchor="middle" font-size="11.5" fill="#A8927C">message + memories</text>
  <line x1="818" y1="246" x2="660" y2="246" stroke="#B07A4E" stroke-width="2.2" marker-end="url(#ah)"/>
  <text x="739" y="266" text-anchor="middle" font-size="11.5" fill="#A8927C">streamed answer</text>

  <line x1="425" y1="362" x2="425" y2="398" stroke="#B07A4E" stroke-width="2.2" marker-end="url(#ah)"/>
  <line x1="613" y1="362" x2="613" y2="398" stroke="#B07A4E" stroke-width="2.2" marker-end="url(#ah)"/>

  <text x="909" y="300" text-anchor="middle" font-size="11.5" fill="#A8927C">uses your API keys</text>
</svg>
