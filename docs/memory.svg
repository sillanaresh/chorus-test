<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 320" font-family="Geist, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif">
  <defs>
    <filter id="c2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#3A2E26" flood-opacity="0.10"/>
    </filter>
    <marker id="ah2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#B07A4E"/>
    </marker>
  </defs>

  <rect x="2" y="2" width="1036" height="316" rx="22" fill="#FBF8F3" stroke="#EFE6D8"/>
  <text x="46" y="52" font-size="26" font-weight="700" fill="#3A2E26">How memory works</text>
  <text x="46" y="78" font-size="14" fill="#8A7866">Learned quietly after a chat, recalled when it is relevant. All on your device.</text>

  <!-- 5 stages -->
  <g>
    <!-- 1 -->
    <g filter="url(#c2)"><rect x="40" y="120" width="166" height="96" rx="15" fill="#ffffff" stroke="#E7D9C8"/></g>
    <text x="123" y="162" text-anchor="middle" font-size="16" font-weight="700" fill="#3A2E26">A conversation</text>
    <text x="123" y="184" text-anchor="middle" font-size="12" fill="#8A7866">goes idle</text>

    <!-- 2 -->
    <g filter="url(#c2)"><rect x="248" y="120" width="166" height="96" rx="15" fill="#FFFDFB" stroke="#E2C9AE"/></g>
    <text x="331" y="158" text-anchor="middle" font-size="16" font-weight="700" fill="#5B4636">Learn</text>
    <text x="331" y="179" text-anchor="middle" font-size="11.5" fill="#8A7866">pick durable facts,</text>
    <text x="331" y="195" text-anchor="middle" font-size="11.5" fill="#8A7866">embed by meaning</text>

    <!-- 3 -->
    <g filter="url(#c2)"><rect x="456" y="120" width="166" height="96" rx="15" fill="#F6EEE2" stroke="#E5D8C7"/></g>
    <text x="539" y="158" text-anchor="middle" font-size="16" font-weight="700" fill="#5B4636">Your memories</text>
    <text x="539" y="179" text-anchor="middle" font-size="11.5" fill="#8A7866">stored on device,</text>
    <text x="539" y="195" text-anchor="middle" font-size="11.5" fill="#8A7866">updated in place</text>

    <!-- 4 -->
    <g filter="url(#c2)"><rect x="664" y="120" width="166" height="96" rx="15" fill="#FFFDFB" stroke="#E2C9AE"/></g>
    <text x="747" y="158" text-anchor="middle" font-size="16" font-weight="700" fill="#5B4636">Recall</text>
    <text x="747" y="179" text-anchor="middle" font-size="11.5" fill="#8A7866">rank by meaning</text>
    <text x="747" y="195" text-anchor="middle" font-size="11.5" fill="#8A7866">for the new message</text>

    <!-- 5 -->
    <g filter="url(#c2)"><rect x="872" y="120" width="166" height="96" rx="15" fill="#ffffff" stroke="#E7D9C8"/></g>
    <text x="955" y="162" text-anchor="middle" font-size="16" font-weight="700" fill="#3A2E26">Next chat</text>
    <text x="955" y="184" text-anchor="middle" font-size="12" fill="#8A7866">gets the context</text>
  </g>

  <!-- arrows -->
  <g stroke="#B07A4E" stroke-width="2.2" marker-end="url(#ah2)">
    <line x1="206" y1="168" x2="244" y2="168"/>
    <line x1="414" y1="168" x2="452" y2="168"/>
    <line x1="622" y1="168" x2="660" y2="168"/>
    <line x1="830" y1="168" x2="868" y2="168"/>
  </g>

  <text x="331" y="250" text-anchor="middle" font-size="11.5" fill="#A8927C">gpt-4o-mini · text-embedding-3-small</text>
  <text x="539" y="250" text-anchor="middle" font-size="11.5" fill="#A8927C">no duplicates</text>
</svg>
